<!DOCTYPE html>
<html>
    <head>
        <style>
            img{
                width:400px;
                height:400px;
                opacity:100%;
            }
        body{
            text-align: center;
            justify-content: center;
        }
        .zoom:hover{
            transform:scale(2);
        }
        .zoom:animate{
            animation:zoomeffect 10s infinite alternate  ease-in-out;
        }
        @keyframes zoomeffect{
            0%{trasform:scale(1);}
            100%{transform:scale(1.3);}
        }
        .stretch:hover{
            transform:scalex(1.5);
        }
        .tall:hover{
            transform:scalex(1.5);
        }
        .shrink:hover{
            transform:scalex(0.7);
        }
        </style>
        <body>
            <h1>Scale image effects</h1>
            <divclass="container">
                <div>
                    <h2>1.hover to zoom</h2>
                    <img src="https://rukminim2.flixcart.com/image/850/1000/jmwch3k0/poster/g/t/t/medium-south-indian-actors-poster-prabhas-hd-quality-wall-poster-original-imaf9peyg8q27vqh.jpeg?q=90&crop=false"alt="zoom image"class="zoom">
                </div>
                <div>
                    <h2>2.continuous zoom in&out</h2>
                    <img src="https://rukminim2.flixcart.com/image/850/1000/jmwch3k0/poster/g/t/t/medium-south-indian-actors-poster-prabhas-hd-quality-wall-poster-original-imaf9peyg8q27vqh.jpeg?q=90&crop=false"alt="zoom animation"class="zoom-animate">
                </div>
                <div>
                    <h2>3.hover to stretch Horizontally</h2>
                    <img src="https://rukminim2.flixcart.com/image/850/1000/jmwch3k0/poster/g/t/t/medium-south-indian-actors-poster-prabhas-hd-quality-wall-poster-original-imaf9peyg8q27vqh.jpeg?q=90&crop=false"alt="stretch image"class="stretch">
                </div>
                <div>
                    <h2>4.hover to stretch vertically</h2>
                    <img src="https://rukminim2.flixcart.com/image/850/1000/jmwch3k0/poster/g/t/t/medium-south-indian-actors-poster-prabhas-hd-quality-wall-poster-original-imaf9peyg8q27vqh.jpeg?q=90&crop=false"alt="tall image"class="tall">
                </div>
                <div>
                    <h2>5.hover to shrink</h2>
                    <img src="https://rukminim2.flixcart.com/image/850/1000/jmwch3k0/poster/g/t/t/medium-south-indian-actors-poster-prabhas-hd-quality-wall-poster-original-imaf9peyg8q27vqh.jpeg?q=90&crop=false"alt="shrink image"class="shrink">
                </div>
        </body>
    </head>
</html>
